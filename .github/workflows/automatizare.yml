name: Colectare Date Meteo Romania

permissions:
  contents: write

on:
  schedule:
    - cron: '15 0,6,12,18 * * *'

  workflow_dispatch:

jobs:
  colectare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaleaza dependinte
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ruleaza colector
        run: python colector.py

      - name: Commit si Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add arhiva_anm_oficial/

          git diff --cached --quiet && exit 0

          git commit -m "Actualizare meteo $(date -u '+%Y-%m-%d %H:%M UTC')"

          git push
